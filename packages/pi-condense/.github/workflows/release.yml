name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Use the npm bundled with Node 24 (>= 11.5.1, so OIDC trusted publishing
      # is supported). Do NOT `npm install -g npm@latest`: npm 12.0.0 ships a
      # broken tree that fails `--provenance` ("Cannot find module 'sigstore'").
      - name: Show npm version
        run: npm --version
      - name: Install dependencies
        run: bun install
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($tag) does not match package.json version $pkg"
            exit 1
          fi
      - name: Run tests
        run: bun test src/
      - name: Publish to npm
        run: npm publish --provenance --access public

  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/edit the GitHub Release
    steps:
      - uses: actions/checkout@v5
      - name: Publish CHANGELOG section as release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            /^## / {
              if (started) exit
              h=$0; sub(/^##[ \t]+/, "", h); sub(/^v/, "", h); sub(/^\[/, "", h)
              if (h ~ ("^" ver "([^0-9.]|$)")) started=1
            }
            started
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::no CHANGELOG section found for $GITHUB_REF_NAME"
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" --notes-file notes.md \
            || gh release edit "$GITHUB_REF_NAME" --notes-file notes.md
